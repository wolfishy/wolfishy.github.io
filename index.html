<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Linktree</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="profile.jpg" alt="Profile Picture" class="profile-pic">
            <h1>Your Name</h1>
            <p>A short bio or tagline goes here!</p>
        </div>
        <div class="links">
            <a href="https://github.com/wolfishy" class="glassmorphic-link">🌟 GitHub</a>
            <a href="https://twitter.com" class="glassmorphic-link">🐦 Twitter</a>
            <a href="https://linkedin.com" class="glassmorphic-link">💼 LinkedIn</a>
            <a href="https://yourwebsite.com" class="glassmorphic-link">🌐 Personal Website</a>
        </div>
        <footer>
            <p>© 2025 Your Name. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
