<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Linktree-like page with Glassmorphic design">
    <title>My Links</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Profile Section -->
        <div class="profile-section">
            <img src="profile.jpg" alt="Profile Picture" class="profile-pic">
            <h1>Your Name</h1>
            <p>Short bio or description goes here.</p>
        </div>

        <!-- Links Section -->
        <div class="links-section">
            <a href="https://github.com/wolfishy" target="_blank" class="link-item">🌟 GitHub</a>
            <a href="https://twitter.com" target="_blank" class="link-item">🐦 Twitter</a>
            <a href="https://linkedin.com" target="_blank" class="link-item">💼 LinkedIn</a>
            <a href="https://yourwebsite.com" target="_blank" class="link-item">🌐 Personal Website</a>
        </div>

        <!-- Footer -->
        <footer>
            <p>© 2025 Your Name. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
